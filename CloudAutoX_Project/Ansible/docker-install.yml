
---
- name: Install Docker on Ubuntu Server
  hosts: servers
  become: true
  tasks:
  - name: Update apt cache
    apt:
      update_cache: yes
  - name: Install Docker
    apt:
      name: docker.io
      state: present
  - name: Start Docker
    service:
      name: docker
      state: started
      enabled: yes
  - name: Add ubuntu user to docker group
    user:
      name: ubuntu
      groups: docker
      append: yes
